name: ToyzzShop Pokémon Monitor

on:
  schedule:
    # Runs every hour at :00
    - cron: "0 * * * *"
  workflow_dispatch:   # lets you trigger a manual run from the GitHub UI anytime

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated state file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/products.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update product state [skip ci]"
          git push
